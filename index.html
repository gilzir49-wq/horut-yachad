<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#4f7a68">
<title>הורות יחד · לביא ועמנואל</title>
<style>
/* ============================================================
   הורות יחד — אפליקציית הורות משותפת (גל ורחל)
   שלב 1 (MVP): משימות · קניות וחוסרים · הוצאות + דשבורד
   כל הנתונים משותפים וחיים בין שני ההורים (Firebase).
   ============================================================ */
:root{
  --bg:#f4f1ea; --card:#ffffff; --ink:#2c3330; --muted:#7c837e;
  --line:#e7e2d6; --brand:#4f7a68; --brand-d:#3c5f51; --gold:#d9a441;
  --lavi:#3b82f6; --lavi-soft:#e7f0ff;      /* לביא — כחול */
  --ema:#c05fb0; --ema-soft:#fbeaf7;         /* עמנואל — ורוד/סגול */
  --ok:#3f9d6d; --warn:#e0873b; --danger:#d15b56;
  --shadow:0 2px 10px rgba(44,51,48,.07);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Rubik,Arial,sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.5;
  max-width:560px; margin:0 auto; min-height:100vh; padding-bottom:90px;
}
h1,h2,h3,h4{margin:0}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,select,textarea{font-family:inherit; font-size:16px}

/* ---------- Login ---------- */
#login{
  position:fixed; inset:0; background:linear-gradient(160deg,#4f7a68,#3c5f51);
  display:flex; align-items:center; justify-content:center; padding:24px; z-index:100;
}
.login-card{
  background:#fff; border-radius:22px; padding:30px 24px; width:100%; max-width:360px;
  text-align:center; box-shadow:0 12px 40px rgba(0,0,0,.25);
}
.login-card .logo{font-size:44px}
.login-card h1{font-size:22px; margin:8px 0 2px}
.login-card p{color:var(--muted); font-size:14px; margin:0 0 20px}
.who{display:flex; gap:12px; margin-bottom:16px}
.who button{
  flex:1; padding:16px 8px; border-radius:16px; border:2px solid var(--line);
  background:#faf8f3; font-weight:700; font-size:16px; transition:.15s;
}
.who button .em{font-size:26px; display:block; margin-bottom:4px}
.who button.sel{border-color:var(--brand); background:#eef4f1}
#code{
  width:100%; padding:14px; border-radius:14px; border:2px solid var(--line);
  text-align:center; letter-spacing:3px; font-weight:700; margin-bottom:14px;
}
.login-card .go{
  width:100%; padding:15px; border-radius:14px; background:var(--brand);
  color:#fff; font-weight:800; font-size:17px;
}
.login-card .go:disabled{opacity:.5}
.login-err{color:var(--danger); font-size:13px; min-height:18px; margin-top:8px}

/* ---------- Header ---------- */
header{
  position:sticky; top:0; z-index:40; background:var(--bg);
  padding:12px 16px 8px; border-bottom:1px solid var(--line);
}
.hrow{display:flex; align-items:center; justify-content:space-between}
.htitle{font-size:18px; font-weight:800; display:flex; align-items:center; gap:7px}
.htitle .dot{width:9px;height:9px;border-radius:50%;background:var(--ok)}
.me{font-size:13px; color:var(--muted); display:flex; align-items:center; gap:8px}
.me button{color:var(--brand); font-weight:700; font-size:13px}

/* child tabs */
.kids{display:flex; gap:10px; margin-top:12px}
.kid{
  flex:1; padding:11px; border-radius:14px; border:2px solid var(--line);
  background:#fff; font-weight:800; font-size:16px; display:flex; align-items:center;
  justify-content:center; gap:8px; transition:.15s;
}
.kid .av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff}
.kid.sel[data-k="lavi"]{border-color:var(--lavi); background:var(--lavi-soft)}
.kid.sel[data-k="ema"]{border-color:var(--ema); background:var(--ema-soft)}

/* ---------- Section nav ---------- */
nav.sections{
  display:flex; flex-wrap:wrap; gap:7px; padding:12px 16px 4px;
}
nav.sections button{
  white-space:nowrap; padding:10px 15px; border-radius:20px; background:#fff;
  border:1px solid var(--line); font-weight:700; font-size:14px; color:var(--muted);
}
nav.sections button.sel{background:var(--brand); color:#fff; border-color:var(--brand)}

main{padding:8px 16px}

/* ---------- Cards & lists ---------- */
.card{background:var(--card); border-radius:16px; padding:14px; box-shadow:var(--shadow); margin-bottom:12px}
.card.k-lavi{border-inline-start:4px solid var(--lavi)}
.card.k-ema{border-inline-start:4px solid var(--ema)}
.row{display:flex; align-items:center; gap:10px}
.spread{justify-content:space-between}
.muted{color:var(--muted); font-size:13px}
.tiny{font-size:12px; color:var(--muted)}
.pill{display:inline-block; padding:2px 9px; border-radius:20px; font-size:12px; font-weight:700}
.pill.p-high{background:#fbe4e2;color:#b23b36}
.pill.p-mid{background:#fdefd9;color:#a86a1e}
.pill.p-low{background:#e6f2ea;color:#2f7a52}
.pill.done{background:#e6f2ea;color:#2f7a52}
.pill.plan{background:#eee9dd;color:#7c6f4e}
.pill.who{background:#eef2f6;color:#516074}
.badge{font-size:11px;font-weight:800;padding:2px 8px;border-radius:8px}
.badge.lavi{background:var(--lavi-soft);color:#1e56b3}
.badge.ema{background:var(--ema-soft);color:#93357f}

.item{border-bottom:1px solid var(--line); padding:12px 0}
.item:last-child{border-bottom:none}
.item h4{font-size:15.5px; font-weight:700}
.item.checked h4{text-decoration:line-through; color:var(--muted)}
.chk{
  width:24px;height:24px;border-radius:8px;border:2px solid var(--line);
  flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-size:14px; color:#fff;
}
.chk.on{background:var(--ok); border-color:var(--ok)}

.add-btn{
  width:100%; padding:13px; border-radius:14px; background:#fff; border:1.5px dashed var(--brand);
  color:var(--brand); font-weight:800; font-size:15px; margin-bottom:14px;
}
.section-title{font-size:15px; font-weight:800; margin:4px 2px 10px; color:var(--brand-d)}

/* comments */
.comments{margin-top:8px; padding-top:8px; border-top:1px dashed var(--line)}
.cmt{font-size:13px; padding:4px 0}
.cmt b{color:var(--brand-d)}
.cmt-add{display:flex; gap:6px; margin-top:6px}
.cmt-add input{flex:1; padding:7px 10px; border-radius:10px; border:1px solid var(--line)}
.cmt-add button{padding:0 14px; border-radius:10px; background:var(--brand); color:#fff; font-weight:700}

/* ---------- Dashboard ---------- */
.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px}
.stat{background:#fff; border-radius:14px; padding:13px; box-shadow:var(--shadow)}
.stat .n{font-size:22px; font-weight:800}
.stat .l{font-size:12px; color:var(--muted)}
.bar-row{margin:9px 0}
.bar-row .lab{display:flex; justify-content:space-between; font-size:13px; margin-bottom:3px}
.bar{height:9px; border-radius:6px; background:#eee7d9; overflow:hidden}
.bar > i{display:block; height:100%; border-radius:6px}
.settle{background:linear-gradient(135deg,#4f7a68,#3c5f51); color:#fff; border-radius:16px; padding:16px; margin-bottom:12px}
.settle .big{font-size:20px; font-weight:800; margin-top:4px}
.settle small{opacity:.85}

/* ---------- Feed ---------- */
.feed-item{display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--line); font-size:14px}
.feed-item:last-child{border-bottom:none}
.feed-item .ic{width:30px;height:30px;border-radius:50%;background:#eef4f1;display:flex;align-items:center;justify-content:center;flex:0 0 auto}

/* ---------- Modal form ---------- */
.overlay{position:fixed; inset:0; background:rgba(30,35,32,.5); z-index:60; display:none; align-items:flex-end; justify-content:center}
.overlay.on{display:flex}
.sheet{background:#fff; width:100%; max-width:560px; border-radius:22px 22px 0 0; padding:18px 18px 26px; max-height:90vh; overflow:auto; animation:up .2s ease}
@keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:none;opacity:1}}
.sheet h3{font-size:18px; margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block; font-size:13px; font-weight:700; margin-bottom:5px; color:var(--brand-d)}
.field input,.field select,.field textarea{
  width:100%; padding:12px; border-radius:12px; border:1.5px solid var(--line); background:#fbfaf6;
}
.field textarea{min-height:64px; resize:vertical}
.seg{display:flex; gap:6px; flex-wrap:wrap}
.seg button{flex:1; min-width:70px; padding:10px; border-radius:11px; border:1.5px solid var(--line); background:#fbfaf6; font-weight:700; font-size:14px}
.seg button.on{border-color:var(--brand); background:#eef4f1; color:var(--brand-d)}
.sheet .save{width:100%; padding:15px; border-radius:14px; background:var(--brand); color:#fff; font-weight:800; font-size:16px; margin-top:6px}
.sheet .cancel{width:100%; padding:12px; text-align:center; color:var(--muted); font-weight:700; margin-top:4px}
.empty{text-align:center; color:var(--muted); padding:30px 10px; font-size:14px}
.export-btn{width:100%;padding:12px;border-radius:12px;background:#fff;border:1.5px solid var(--line);color:var(--brand-d);font-weight:700;margin-top:4px}
.split-row{display:flex;align-items:center;gap:8px;font-size:14px}
.split-row input{width:64px;text-align:center;padding:8px;border-radius:10px;border:1.5px solid var(--line)}
/* ---------- Calendar ---------- */
.cal-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cal-nav select{flex:1;padding:9px;border-radius:11px;border:1.5px solid var(--line);background:#fff;font-weight:700}
.cal-nav .arw{font-size:20px;color:var(--brand);padding:4px 10px;background:#fff;border:1.5px solid var(--line);border-radius:11px}
.cal-today{width:100%;padding:9px;border-radius:11px;background:var(--brand);color:#fff;font-weight:700;margin-bottom:12px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:12px;font-weight:800;color:var(--muted);padding:4px 0}
.cal-cell{aspect-ratio:1;border-radius:10px;background:#fff;border:1.5px solid var(--line);padding:3px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;position:relative}
.cal-cell.empty{background:transparent;border:none}
.cal-cell .dnum{font-size:13px;font-weight:700;margin-top:1px}
.cal-cell.today{border-color:var(--brand);border-width:2px}
.cal-cell.sel{background:var(--brand);}
.cal-cell.sel .dnum{color:#fff}
.cal-cell.other .dnum{color:#c9c3b5}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;margin-top:2px}
.cal-dot{width:6px;height:6px;border-radius:50%}
.cal-legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:12px 0;font-size:12px;color:var(--muted)}
.cal-legend span{display:flex;align-items:center;gap:4px}
.cal-legend i{width:8px;height:8px;border-radius:50%;display:inline-block}
/* ---------- Quick-log grid + toast ---------- */
.qgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.qgrid button{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:11px 4px;font-size:24px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:.1s}
.qgrid button:active{transform:scale(.94);background:#eef4f1}
.qgrid button span{font-size:12px;font-weight:800;color:var(--ink)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--brand-d);color:#fff;padding:11px 20px;border-radius:22px;font-weight:800;z-index:90;box-shadow:0 6px 18px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.22s;max-width:90%;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.wake-banner{background:#eef4f1;border:1.5px solid var(--brand);border-radius:16px;padding:14px;margin-bottom:12px}
/* ---------- Floating quick-add button (FAB) ---------- */
#fab{position:fixed;bottom:22px;left:16px;width:62px;height:62px;border-radius:50%;
  background:var(--brand);color:#fff;font-size:34px;line-height:1;z-index:55;
  display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(60,95,81,.45);transition:.12s}
#fab:active{transform:scale(.9)}
@media(min-width:600px){#fab{left:calc(50% - 280px + 16px)}}
/* ---------- Customize (dashboard editor) ---------- */
#gearBtn{font-size:17px;padding:2px 4px}
.pref-row{display:flex;align-items:center;gap:9px;padding:9px 2px;border-bottom:1px solid var(--line)}
.pref-eye{width:40px;height:40px;border-radius:11px;border:1.5px solid var(--line);font-size:17px;background:#faf8f3}
.pref-eye.on{background:#eef4f1;border-color:var(--brand)}
.pref-label{flex:1;font-weight:700;font-size:15px}
.pref-label.off{color:var(--muted);text-decoration:line-through}
.pref-arrows button{width:36px;height:36px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;margin-inline-start:5px;background:#fff}
.pref-arrows button:disabled{opacity:.28}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="login-card">
    <div class="logo">👨‍👩‍👧</div>
    <h1>הורות יחד</h1>
    <p>לביא ועמנואל · מקום אחד לשנינו</p>
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px">מי נכנס/ת? (פעם אחת, נזכר תמיד)</div>
    <div class="who">
      <button data-who="גל"><span class="em">👨</span>גל</button>
      <button data-who="רחל"><span class="em">👩</span>רחל</button>
    </div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" style="display:none">
  <header>
    <div class="hrow">
      <div class="htitle"><span class="dot" id="syncDot"></span>הורות יחד</div>
      <div class="me"><span id="meName"></span><button id="gearBtn" onclick="openCustomize()" title="התאמה אישית">⚙️</button><button id="logout">יציאה</button></div>
    </div>
    <div class="kids">
      <button class="kid sel" data-k="lavi"><span class="av" style="background:var(--lavi)">👦</span>לביא</button>
      <button class="kid" data-k="ema"><span class="av" style="background:var(--ema)">👶</span>עמנואל</button>
    </div>
  </header>

  <nav class="sections" id="nav"></nav>
  <main id="main"></main>
  <button id="fab" onclick="openQuickPicker()" title="תיעוד מהיר">＋</button>
</div>

<!-- ============ MODAL ============ -->
<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>

<script>
/* =====================================================================
   ⚙️  הגדרות — אפשר לערוך כאן בלבד
   ===================================================================== */
const CLOUD = {
  url : "https://command-center-gal-default-rtdb.europe-west1.firebasedatabase.app",
  node: "coparent-lavi-ema-7q2x9",   // כתובת סודית של הנתונים
  code: "2409"                        // 🔑 הקוד המשפחתי לכניסה (אפשר לשנות)
};
const PARENTS = ["גל","רחל"];
const KIDS = { lavi:{name:"לביא", emoji:"👦", color:"var(--lavi)"},
               ema :{name:"עמנואל", emoji:"👶", color:"var(--ema)"} };
const CATEGORIES = ["טיפולים","קניות","חינוך","חוגים","ביגוד","בריאות","אחר"];
const CAT_COLORS = {"טיפולים":"#6a8fd8","קניות":"#d9a441","חינוך":"#7b9e5a","חוגים":"#c05fb0",
  "ביגוד":"#5cae9e","בריאות":"#d15b56","אחר":"#9b9384"};

/* =====================================================================
   מצב האפליקציה — נתונים משותפים
   ===================================================================== */
let STATE = defaultState();
let ME = null;              // ההורה המחובר
let CUR_KID = "lavi";       // הילד הנבחר
let CUR_SEC = "home";       // הלשונית הפעילה
let CUR_DIARY_DATE = null;  // תאריך היומן המוצג (null = היום)
let DIARY_VIEW = "day";     // "day" או "month"
let CUR_MONTH = null;       // חודש נבחר בארכיון (YYYY-MM); null = החודש הנוכחי
let CAL_MONTH = null;       // חודש מוצג בלוח השנה (YYYY-MM); null = החודש הנוכחי
let CAL_DATE = null;        // יום נבחר בלוח השנה (ISO); null = היום
let EDIT_ID = null;         // מזהה רישום שנערך (null = הוספה חדשה)
let lastUpdated = 0;
let editing = false;        // מונע דריסה תוך כדי מילוי טופס

function defaultState(){
  return {
    tasks:[], shopping:[], expenses:[], diary:[], files:[], recipes:[],
    profiles:{ lavi:{birth:""}, ema:{birth:""} },   // תאריכי לידה
    settings:{ splitGal:50 },   // אחוז שגל צריך לשאת; רחל = המשלים
    activity:[],
    updatedAt:0
  };
}

/* =====================================================================
   ענן — טעינה ושמירה
   ===================================================================== */
const DBURL = CLOUD.url + "/" + CLOUD.node + ".json";
async function loadCloud(){
  try{
    const r = await fetch(DBURL + "?t=" + Date.now());
    if(!r.ok) return null;
    const o = await r.json();
    if(o && o.json){ return { state:JSON.parse(o.json), updatedAt:o.updatedAt||0 }; }
  }catch(e){ console.warn("load", e); }
  return null;
}
async function pushCloud(){
  STATE.updatedAt = Date.now();
  lastUpdated = STATE.updatedAt;
  setDot("#e0873b");
  try{
    await fetch(DBURL, {method:"PUT", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ json:JSON.stringify(STATE), updatedAt:STATE.updatedAt })});
    setDot("var(--ok)");
  }catch(e){ setDot("var(--danger)"); }
}
function setDot(c){ const d=document.getElementById("syncDot"); if(d) d.style.background=c; }

async function syncPoll(){
  if(editing) return;
  const res = await loadCloud();
  if(res && res.updatedAt > lastUpdated){
    STATE = Object.assign(defaultState(), res.state);
    lastUpdated = res.updatedAt;
    render();
  }
}

/* =====================================================================
   כלי עזר
   ===================================================================== */
const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const nis = n => "₪"+ (Math.round(n*100)/100).toLocaleString("he-IL");
// תאריך מקומי (לא UTC) — קריטי בישראל UTC+2/+3 כדי שהחצים והתאריכים יהיו מדויקים
function isoLocal(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function todayISO(){ return isoLocal(new Date()); }
function fmtDate(iso){ if(!iso) return ""; const d=new Date(iso+ (iso.length<=10?"T00:00":""));
  return d.toLocaleDateString("he-IL",{day:"numeric",month:"short"}); }
function timeAgo(ts){
  const s=(Date.now()-ts)/1000;
  if(s<60) return "עכשיו";
  if(s<3600) return Math.floor(s/60)+" ד׳";
  if(s<86400) return Math.floor(s/3600)+" ש׳";
  return Math.floor(s/86400)+" ימים";
}
function logActivity(text, emoji){
  STATE.activity.unshift({id:uid(), ts:Date.now(), who:ME, text, emoji:emoji||"•"});
  STATE.activity = STATE.activity.slice(0,60);
}
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* =====================================================================
   התחברות
   ===================================================================== */
// כניסה בלחיצה — בוחרים מי אתם, בלי קוד. הבחירה נזכרת לתמיד במכשיר.
document.querySelectorAll(".who button").forEach(b=>{
  b.onclick=()=>{ ME=b.dataset.who; localStorage.setItem("horut_me", ME); startApp(); };
});
document.getElementById("logout").onclick=()=>{ localStorage.removeItem("horut_me"); location.reload(); };

async function startApp(){
  loadPrefs();
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("meName").textContent="מחובר/ת: "+ME;
  const res=await loadCloud();
  if(res){ STATE=Object.assign(defaultState(),res.state); lastUpdated=res.updatedAt; }
  else{ seedIfEmpty(); }
  render();
  setInterval(syncPoll, 8000);
}

/* דוגמת נתונים ראשונית (רק אם הענן ריק) */
function seedIfEmpty(){
  // תאריכי לידה לדוגמה — עדכנו בפרופיל של כל ילד
  const d1=isoLocal(new Date(Date.now()-8*30*864e5));   // עמנואל ~8 חודשים
  const d2=isoLocal(new Date(Date.now()-6*365*864e5));  // לביא ~6 שנים

function render(){
  // nav (לפי ההעדפות האישיות — סדר + הצגה/הסתרה)
  if(!PREFS) loadPrefs();
  let navSecs=PREFS.nav.filter(p=>p.on).map(p=>SECTIONS.find(s=>s.id===p.id)).filter(Boolean);
  if(!navSecs.length) navSecs=SECTIONS.slice();
  if(!navSecs.find(s=>s.id===CUR_SEC)) CUR_SEC=navSecs[0].id;
  const nav=document.getElementById("nav");
  nav.innerHTML=navSecs.map(s=>`<button data-s="${s.id}" class="${s.id===CUR_SEC?'sel':''}">${s.label}</button>`).join("");
  nav.querySelectorAll("button").forEach(b=> b.onclick=()=>{ CUR_SEC=b.dataset.s; render(); });
  // main
  const m=document.getElementById("main");
  if(CUR_SEC==="home") m.innerHTML=viewHome();
  else if(CUR_SEC==="diary") m.innerHTML=viewDiary();
  else if(CUR_SEC==="calendar") m.innerHTML=viewCalendar();
  else if(CUR_SEC==="tasks") m.innerHTML=viewTasks();
  else if(CUR_SEC==="shopping") m.innerHTML=viewShopping();
  else if(CUR_SEC==="expenses") m.innerHTML=viewExpenses();
  else if(CUR_SEC==="files") m.innerHTML=viewFiles();
  else if(CUR_SEC==="recipes") m.innerHTML=viewRecipes();
  bindMain();
}

/* =====================================================================
   התאמה אישית — מה מופיע, באיזה סדר (נשמר במכשיר, פר-הורה)
   ===================================================================== */
let PREFS = null;
const HOME_LABELS={tasks:'משימות פתוחות',shopping:'חוסרים לקנות',expenses:'הוצאות החודש',
  age:'גיל הילד',sleep:'שינה היום',meals:'ארוחות היום',settle:'מאזן התחשבנות',
  opensleep:'התראת שינה פתוחה',feed:'פיד "מה חדש"'};
function defaultPrefs(){
  return {
    nav: SECTIONS.map(s=>({id:s.id,on:true})),
    home: [
      {id:'tasks',on:true},{id:'shopping',on:true},{id:'expenses',on:true},{id:'age',on:true},
      {id:'opensleep',on:true},{id:'sleep',on:false},{id:'meals',on:false},{id:'settle',on:false},
      {id:'feed',on:true}
    ]
  };
}
function mergeList(def,saved){
  const defIds=def.map(x=>x.id);
  const valid=(saved||[]).filter(x=>defIds.includes(x.id));
  const seen=valid.map(x=>x.id);
  return valid.concat(def.filter(x=>!seen.includes(x.id)));
}
function loadPrefs(){
  let s=null; try{ s=JSON.parse(localStorage.getItem("horut_prefs")); }catch(e){}
  const d=defaultPrefs();
  PREFS = s ? {nav:mergeList(d.nav,s.nav), home:mergeList(d.home,s.home)} : d;
}
function savePrefs(){ localStorage.setItem("horut_prefs", JSON.stringify(PREFS)); }
function prefsToggle(kind,id){ const p=PREFS[kind].find(x=>x.id===id); if(p)p.on=!p.on; savePrefs(); render(); openCustomize(); }
function prefsMove(kind,id,dir){
  const arr=PREFS[kind]; const i=arr.findIndex(x=>x.id===id); const j=i+dir;
  if(j<0||j>=arr.length) return;
  const t=arr[i]; arr[i]=arr[j]; arr[j]=t;
  savePrefs(); render(); openCustomize();
}
function prefsReset(){ if(!confirm("לאפס את הסידור לברירת המחדל?"))return; PREFS=defaultPrefs(); savePrefs(); render(); openCustomize(); }
function prefRow(kind,p,i,len,label){
  return `<div class="pref-row">
    <button class="pref-eye ${p.on?'on':''}" onclick="prefsToggle('${kind}','${p.id}')" title="${p.on?'מוצג':'מוסתר'}">${p.on?'👁️':'🚫'}</button>
    <span class="pref-label ${p.on?'':'off'}">${label}</span>
    <span class="pref-arrows">
      <button onclick="prefsMove('${kind}','${p.id}',-1)" ${i===0?'disabled':''}>▲</button>
      <button onclick="prefsMove('${kind}','${p.id}',1)" ${i===len-1?'disabled':''}>▼</button>
    </span>
  </div>`;
}
function openCustomize(){
  editing=true;
  if(!PREFS) loadPrefs();
  const homeRows=PREFS.home.map((p,i)=>prefRow('home',p,i,PREFS.home.length, HOME_LABELS[p.id]||p.id)).join("");
  const navRows=PREFS.nav.map((p,i)=>prefRow('nav',p,i,PREFS.nav.length, (SECTIONS.find(s=>s.id===p.id)||{}).label||p.id)).join("");
  sheet(`<h3>⚙️ התאמה אישית</h3>
    <p class="muted" style="margin-top:-6px">👁️ מוצג · 🚫 מוסתר · ▲▼ לשינוי הסדר. נשמר במכשיר שלך בלבד — גל ורחל יכולים לסדר כל אחד אחרת.</p>
    <div class="section-title">🏠 דף הבית — מה מופיע ובאיזה סדר</div>
    ${homeRows}
    <div class="section-title" style="margin-top:16px">📱 הלשוניות — מה מופיע ובאיזה סדר</div>
    ${navRows}
    <button class="export-btn" onclick="prefsReset()" style="margin-top:14px">↺ איפוס לברירת מחדל</button>
    <div class="cancel" onclick="closeSheet()">סגירה</div>`);
}

function viewHome(){
  const k=CUR_KID;
  if(!PREFS) loadPrefs();
  const openTasks=STATE.tasks.filter(t=>t.kid===k&&!t.done).length;
  const needBuy=STATE.shopping.filter(s=>s.kid===k&&!s.bought).length;
  const monthExp=STATE.expenses.filter(e=>e.kid===k&&sameMonth(e.date)).reduce((a,e)=>a+ +e.amount,0);
  const a=ageInfo(k);
  const today=todayISO();
  const daySleep=STATE.diary.filter(e=>e.kid===k&&e.date===today&&e.type==="sleep").reduce((x,e)=>x+sleepHours(e),0);
  const dayMeals=STATE.diary.filter(e=>e.kid===k&&e.date===today&&e.type==="meal"&&e.outcome!=="tried").length;
  const settle=computeSettle();
  const openSleep=STATE.diary.filter(e=>e.kid===k&&e.type==="sleep"&&!e.end&&e.outcome!=="tried").sort((x,y)=>y.createdAt-x.createdAt)[0];
  const ageStat = a
    ? `<div class="stat" onclick="openProfile('${k}')" style="cursor:pointer"><div class="n" style="font-size:16px;padding:3px 0">${KIDS[k].emoji} ${a.label}</div><div class="l">גיל ${KIDS[k].name}</div></div>`
    : `<div class="stat" onclick="openProfile('${k}')" style="cursor:pointer"><div class="n" style="font-size:16px;padding:3px 0">➕ הזינו</div><div class="l">תאריך לידה</div></div>`;
  const feed = `<div class="section-title">📣 מה חדש (שני הילדים)</div><div class="card">`+
    (STATE.activity.length ? STATE.activity.slice(0,20).map(x=>`
      <div class="feed-item"><div class="ic">${x.emoji}</div>
        <div style="flex:1"><div>${esc(x.text)}</div><div class="tiny">${esc(x.who)} · ${timeAgo(x.ts)}</div></div>
        <button onclick="delActivity('${x.id}')" class="tiny" style="color:var(--danger);padding:4px 8px" title="הסרה מהפיד">✕</button></div>`).join("")
      : `<div class="empty">אין פעילות עדיין</div>`)+`</div>`+
    (STATE.activity.length ? `<button class="export-btn" onclick="clearFeed()" style="margin-bottom:12px">🧹 ניקוי הפיד</button>` : "");

  const W={
    tasks:{t:'stat',h:`<div class="stat" onclick="go('tasks')" style="cursor:pointer"><div class="n" style="color:var(--brand)">${openTasks}</div><div class="l">משימות פתוחות</div></div>`},
    shopping:{t:'stat',h:`<div class="stat" onclick="go('shopping')" style="cursor:pointer"><div class="n" style="color:var(--gold)">${needBuy}</div><div class="l">חוסרים לקנות</div></div>`},
    expenses:{t:'stat',h:`<div class="stat" onclick="go('expenses')" style="cursor:pointer"><div class="n">${nis(monthExp)}</div><div class="l">הוצאות החודש</div></div>`},
    age:{t:'stat',h:ageStat},
    sleep:{t:'stat',h:`<div class="stat" onclick="go('diary')" style="cursor:pointer"><div class="n" style="color:var(--brand)">${daySleep?daySleep.toFixed(1):"0"}<span style="font-size:13px"> ש׳</span></div><div class="l">שינה היום</div></div>`},
    meals:{t:'stat',h:`<div class="stat" onclick="go('diary')" style="cursor:pointer"><div class="n" style="color:var(--gold)">${dayMeals}</div><div class="l">ארוחות היום</div></div>`},
    settle:{t:'block',h:`<div class="settle" onclick="go('expenses')" style="cursor:pointer"><small>מאזן התחשבנות</small><div class="big">${settle.text}</div></div>`},
    opensleep:{t:'block',h: openSleep?`<div class="wake-banner"><div>😴 <b>${KIDS[k].name}</b> נרדמה ב-${openSleep.start}${openSleep.date!==today?" ("+dayLabel(openSleep.date)+")":""} — עדיין ישנה</div><button class="save" style="margin-top:8px" onclick="wakeSleep('${openSleep.id}')">☀️ סמן יקיצה עכשיו (${nowHHMM()})</button></div>`:""},
    feed:{t:'block',h:feed}
  };

  let html=""; let buf=[];
  const flush=()=>{ if(buf.length){ html+=`<div class="stat-grid">${buf.join("")}</div>`; buf=[]; } };
  PREFS.home.filter(p=>p.on).forEach(p=>{ const w=W[p.id]; if(!w||!w.h) return;
    if(w.t==="stat") buf.push(w.h); else { flush(); html+=w.h; } });
  flush();
  html+=`<button class="export-btn" onclick="openCustomize()" style="margin-top:8px">⚙️ עריכת דף הבית והלשוניות</button>`;
  return html;
}
function sameMonth(iso){ if(!iso) return false; const d=new Date(iso); const n=new Date();
  return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear(); }
function delActivity(id){ STATE.activity=STATE.activity.filter(a=>a.id!==id); pushCloud(); render(); }
function clearFeed(){ if(!confirm("לנקות את כל הפיד? (הרישומים עצמם נשמרים)"))return; STATE.activity=[]; pushCloud(); render(); }

function saveTask(){
  const title=val("f-title").trim(); if(!title){ alert("צריך כותרת"); return; }
  const data={title,desc:val("f-desc").trim(),owner:segVal("f-owner"),priority:segVal("f-pri"),due:val("f-due")};
  if(EDIT_ID){ Object.assign(STATE.tasks.find(x=>x.id===EDIT_ID),data); }
  else STATE.tasks.push(Object.assign({id:uid(),kid:CUR_KID,done:false,comments:[],createdBy:ME,createdAt:Date.now()},data));
  logActivity(`משימה ל${KIDS[CUR_KID].name}: ${title}`,"✅");
  closeSheet(); pushCloud(); render();
}
function editTask(id){ const t=STATE.tasks.find(x=>x.id===id); if(t) openTaskForm(t); }
function toggleTask(id){ const t=STATE.tasks.find(x=>x.id===id); if(!t)return;
  t.done=!t.done; if(t.done){t.doneBy=ME;t.doneAt=Date.now(); logActivity(`סימן/ה כבוצע: ${t.title}`,"✔️");}

function delTask(id){ if(!confirm("למחוק משימה?"))return;

function computeSettle(){
  const exps=STATE.expenses;
  const total=exps.reduce((a,e)=>a+ +e.amount,0);
  const paidGal=exps.filter(e=>e.paidBy==="גל").reduce((a,e)=>a+ +e.amount,0);
  const paidRachel=exps.filter(e=>e.paidBy==="רחל").reduce((a,e)=>a+ +e.amount,0);
  const shareGal=total*STATE.settings.splitGal/100;   // כמה גל אמור לשאת
  const galBalance=paidGal-shareGal;                   // חיובי = גל שילם יותר מחלקו
  let text;
  if(Math.abs(galBalance)<1) text="מאוזן ✓";
  else if(galBalance>0) text=`רחל חייבת לגל ${nis(galBalance)}`;
  else text=`גל חייב לרחל ${nis(-galBalance)}`;
  return {total,paidGal,paidRachel,text};
}

/* =====================================================================
   גיל, נורמות והתפתחות (לפי תאריך לידה)
   ===================================================================== */
function birthOf(k){ return (STATE.profiles&&STATE.profiles[k]&&STATE.profiles[k].birth)||""; }
function ageInfo(k){
  const b=birthOf(k); if(!b) return null;
  const bd=new Date(b+"T00:00"), now=new Date();
  let months=(now.getFullYear()-bd.getFullYear())*12+(now.getMonth()-bd.getMonth());
  if(now.getDate()<bd.getDate()) months--;
  const totalDays=Math.floor((now-bd)/864e5);
  const years=Math.floor(months/12), rem=months%12;
  let label;
  if(months<1) label=totalDays+" ימים";
  else if(months<24) label=months+" חודשים";
  else label=years+" שנים"+(rem?` ו-${rem} חו׳`:"");
  return {months, totalDays, years, label};
}
/* נורמות שינה מומלצות (24 שעות כולל צהריים) לפי גיל בחודשים */
function sleepNorm(months){
  if(months<4)  return [14,17];
  if(months<12) return [12,16];
  if(months<24) return [11,14];
  if(months<36) return [10,13];
  if(months<72) return [10,13];
  return [9,12];
}
/* אבני דרך התפתחותיות עיקריות לפי גיל */
const MILESTONES=[
  {m:2, t:"חיוך חברתי, מתחילה לעקוב אחרי פנים ולהשמיע קולות"},
  {m:4, t:"מחזיקה ראש יציב, צוחקת, מושיטה יד לחפצים"},
  {m:6, t:"מתהפכת, יושבת בתמיכה, מתחילה מזון מוצק"},
  {m:9, t:"יושבת לבד, זוחלת, אומרת הברות (בא-בא/מא-מא)"},
  {m:12, t:"עומדת/צועדת בהיאחזות, מילה ראשונה, מצביעה"},
  {m:18, t:"הולכת בביטחון, כמה מילים, שותה מכוס"},
  {m:24, t:"רצה, מרכיבה 2 מילים, מדרגות בעזרה"},
  {m:36, t:"משפטים, משחק דמיוני, מתחילה גמילה"},
];
function nextMilestone(months){
  for(const ms of MILESTONES){ if(months < ms.m+1) return ms; }
  return null;
}
function ageInsight(k){
  const a=ageInfo(k); if(!a) return "";
  const norm=sleepNorm(a.months);
  const dt=curDiaryDate();
  const daySleep=STATE.diary.filter(e=>e.kid===k&&e.date===dt&&e.type==="sleep").reduce((x,e)=>x+sleepHours(e),0);
  let sleepMsg="";
  if(daySleep>0){
    if(daySleep<norm[0]) sleepMsg=`ישן/ה פחות מהמומלץ (${daySleep.toFixed(1)} מול ${norm[0]}–${norm[1]} ש׳) 🔵`;
    else if(daySleep>norm[1]) sleepMsg=`ישן/ה מעל המומלץ (${daySleep.toFixed(1)} מול ${norm[0]}–${norm[1]} ש׳)`;
    else sleepMsg=`שעות שינה בטווח התקין (${daySleep.toFixed(1)} ש׳) ✅`;
  } else {
    sleepMsg=`מומלץ בגיל זה: ${norm[0]}–${norm[1]} שעות שינה ביממה`;
  }
  const ms=nextMilestone(a.months);
  const msMsg=ms?`בסביבות גיל ${ms.m} חודשים: ${ms.t}`:"";
  return `<div class="card ${kidClass(k)}" style="background:#fbfaf6">
      <div class="tiny" style="font-weight:800;color:var(--brand-d);margin-bottom:6px">🌱 תובנות לגיל ${a.label}</div>
      <div style="font-size:13.5px;margin-bottom:6px">😴 ${sleepMsg}</div>
      ${msMsg?`<div style="font-size:13.5px">🧩 ${msMsg}</div>`:""}
    </div>`;
}

/* =====================================================================
   יומן יומי (אוכל · שינה · מצב רוח/בריאות) — לעמנואל וללביא
   ===================================================================== */
const MEALS=["בוקר","צהריים","ערב","ביניים"];
const MOODS=[["😊","שמח/ה"],["😐","רגיל"],["😢","בכיין/ית"],["😴","עייף/ה"],["🤒","לא מרגיש/ה טוב"]];
function curDiaryDate(){ return CUR_DIARY_DATE || todayISO(); }
function shiftDiary(days){
  const d=new Date(curDiaryDate()+"T00:00"); d.setDate(d.getDate()+days);
  const iso=isoLocal(d);
  if(iso>todayISO()) return;               // אי אפשר לעבור לעתיד
  CUR_DIARY_DATE = (iso===todayISO()) ? null : iso;
  render();
}
function dayLabel(iso){
  const d=new Date(iso+"T00:00"), t=todayISO();
  const yest=new Date(); yest.setDate(yest.getDate()-1);
  if(iso===t) return "היום";
  if(iso===isoLocal(yest)) return "אתמול";
  return d.toLocaleDateString("he-IL",{weekday:"long",day:"numeric",month:"long"});
}
function sleepHours(e){
  if(e.type!=="sleep"||e.outcome==="tried"||!e.start||!e.end) return 0;
  const [sh,sm]=e.start.split(":").map(Number), [eh,em]=e.end.split(":").map(Number);
  let mins=(eh*60+em)-(sh*60+sm); if(mins<0) mins+=24*60;
  return mins/60;
}
/* תצוגה אחידה של רישום יומן (משמש גם ביומן וגם בלוח השנה) */
function entryDisplay(e){
  let icon,title,sub=""; const note=e.note?esc(e.note):"";
  if(e.type==="meal"){
    icon="🍽️";
    if(e.outcome==="tried"){ title=`ניסיון האכלה${e.meal?" · "+esc(e.meal):""}`;
      const p=[]; if(e.what)p.push("הוצע: "+esc(e.what)); if(note)p.push(note); sub=p.join(" · "); }
    else { title=`${esc(e.meal)}${e.what?" — "+esc(e.what):""}`;
      const p=[]; if(e.amount)p.push("כמות: "+esc(e.amount)); if(note)p.push(note); sub=p.join(" · "); }
  } else if(e.type==="sleep"){
    icon="😴";
    if(e.outcome==="tried"){ title="ניסיון הרדמה (לא נרדמה)"; sub=note; }
    else if(!e.end){ title=`נרדמ/ה ב-${e.start} · עדיין ישן/ה 🌙`; sub=note; }
    else { title=`שינה${e.isNap?" (צהריים)":""} ${e.start}–${e.end}`;
      const p=[`${sleepHours(e).toFixed(1)} שעות`]; if(e.quality)p.push(esc(e.quality)); if(note)p.push(note); sub=p.join(" · "); }
  } else if(e.type==="diaper"){
    icon = e.what==="קקי"?"💩":e.what==="פיפי"?"💧":"🧷"; title=esc(e.what||"חיתול"); sub=note;
  } else if(e.type==="note"){
    icon="📝"; title=esc(e.text||"הערה"); sub=note;
  } else { // health
    icon=e.mood?e.mood.split(" ")[0]:"😊"; title=e.mood?esc(e.mood):"מצב רוח";
    const p=[]; if(e.temp)p.push("🌡️ "+esc(e.temp)+"°"); if(e.meds)p.push("💊 "+esc(e.meds));
    if(e.diaper)p.push("🧷 "+esc(e.diaper)); if(e.school)p.push("🏫 "+esc(e.school)); if(note)p.push(note);
    sub=p.join(" · ");
  }
  return {icon,title,sub};
}

function weeklyTrends(k){
  const days=[]; const base=new Date(curDiaryDate()+"T00:00");
  for(let i=6;i>=0;i--){ const d=new Date(base); d.setDate(d.getDate()-i); days.push(isoLocal(d)); }
  const sleepBy={}, mealsBy={};
  days.forEach(dt=>{ const es=STATE.diary.filter(e=>e.kid===k&&e.date===dt);
    sleepBy[dt]=es.filter(e=>e.type==="sleep").reduce((a,e)=>a+sleepHours(e),0);
    mealsBy[dt]=es.filter(e=>e.type==="meal").length; });
  const maxS=Math.max(1,...Object.values(sleepBy)), maxM=Math.max(1,...Object.values(mealsBy));
  const dow=dt=>new Date(dt+"T00:00").toLocaleDateString("he-IL",{weekday:"narrow"});
  const barsChart=(by,max,col,unit)=>`<div class="row" style="align-items:flex-end;gap:6px;height:90px;margin-top:6px">`+
    days.map(dt=>`<div style="flex:1;text-align:center">
      <div style="height:70px;display:flex;align-items:flex-end"><div style="width:100%;border-radius:6px 6px 0 0;background:${col};height:${Math.max(3,(by[dt]/max)*70)}px" title="${by[dt]}"></div></div>
      <div class="tiny" style="margin-top:3px">${by[dt]?(unit==='h'?by[dt].toFixed(1):by[dt]):''}</div>
      <div class="tiny">${dow(dt)}</div>
    </div>`).join("")+`</div>`;
  return `<div class="section-title">מגמות שבוע</div>
    <div class="card"><div class="tiny" style="font-weight:700;color:var(--brand-d)">😴 שעות שינה ליום</div>
      ${barsChart(sleepBy,maxS,"var(--"+(k==="ema"?"ema":"lavi")+")","h")}</div>
    <div class="card"><div class="tiny" style="font-weight:700;color:var(--brand-d)">🍽️ מספר ארוחות ליום</div>
      ${barsChart(mealsBy,maxM,"var(--gold)","n")}</div>`;
}
/* ---------- ארכיון חודשי + השוואת מגמות בין חודשים ---------- */
function setDiaryView(v){ DIARY_VIEW=v; render(); }
function curMonth(){ return CUR_MONTH || todayISO().slice(0,7); }   // YYYY-MM
function shiftMonth(n){
  const [y,m]=curMonth().split("-").map(Number);
  const d=new Date(y, m-1+n, 1);
  const iso=isoLocal(d).slice(0,7);
  CUR_MONTH = (iso===todayISO().slice(0,7)) ? null : iso;
  render();
}
function monthLabel(ym){ const [y,m]=ym.split("-").map(Number);
  return new Date(y,m-1,1).toLocaleDateString("he-IL",{month:"long",year:"numeric"}); }
/* מדדי חודש: ממוצע שינה/יום, סה״כ+ממוצע ארוחות, ימים עם רישום */
function monthStats(k, ym){
  const es=STATE.diary.filter(e=>e.kid===k && (e.date||"").slice(0,7)===ym);
  const daysSet=new Set(es.map(e=>e.date));
  const sleepByDay={}, mealByDay={};
  es.forEach(e=>{ if(e.type==="sleep") sleepByDay[e.date]=(sleepByDay[e.date]||0)+sleepHours(e);
                  if(e.type==="meal"&&e.outcome!=="tried") mealByDay[e.date]=(mealByDay[e.date]||0)+1; });
  const sleepDays=Object.keys(sleepByDay);
  const avgSleep=sleepDays.length? sleepDays.reduce((a,d)=>a+sleepByDay[d],0)/sleepDays.length : 0;
  const totalMeals=es.filter(e=>e.type==="meal"&&e.outcome!=="tried").length;
  const mealDays=Object.keys(mealByDay);
  const avgMeals=mealDays.length? totalMeals/mealDays.length : 0;
  return {loggedDays:daysSet.size, avgSleep, totalMeals, avgMeals, sleepByDay, count:es.length};
}
function viewDiaryMonth(k){
  const ym=curMonth(), st=monthStats(k,ym);
  // חודש קודם להשוואה
  const [y,m]=ym.split("-").map(Number);
  const prevYm=isoLocal(new Date(y,m-2,1)).slice(0,7);
  const prev=monthStats(k,prevYm);
  const delta=(st.avgSleep&&prev.avgSleep)? st.avgSleep-prev.avgSleep : null;
  let deltaTxt="";
  if(delta!==null){
    const arr=delta>0.1?"⬆️ עלייה":delta<-0.1?"⬇️ ירידה":"➡️ יציב";
    deltaTxt=`${arr} של ${Math.abs(delta).toFixed(1)} ש׳ בממוצע השינה מול ${monthLabel(prevYm)}`;
  }
  // גרף שינה יומי לאורך החודש
  const daysInMonth=new Date(y,m,0).getDate();
  const sb=st.sleepByDay;
  const maxS=Math.max(1,...Object.values(sb));
  let bars=`<div class="row" style="align-items:flex-end;gap:2px;height:90px;margin-top:8px">`;
  for(let d=1; d<=daysInMonth; d++){
    const dd=ym+"-"+String(d).padStart(2,"0"); const v=sb[dd]||0;
    bars+=`<div style="flex:1" title="${d}: ${v.toFixed(1)}ש׳">
      <div style="height:80px;display:flex;align-items:flex-end"><div style="width:100%;border-radius:3px 3px 0 0;background:var(--${k==="ema"?"ema":"lavi"});height:${Math.max(2,(v/maxS)*80)}px"></div></div>
    </div>`;
  }
  bars+=`</div>`;

  let html=`<div class="card" style="padding:10px 12px">
      <div class="row spread">
        <button onclick="shiftMonth(-1)" style="font-size:20px;color:var(--brand);padding:4px 10px">›</button>
        <div style="text-align:center"><b>${monthLabel(ym)}</b><div class="tiny">${st.loggedDays} ימים עם רישום</div></div>
        <button onclick="shiftMonth(1)" ${ym>=todayISO().slice(0,7)?'disabled style="opacity:.3;padding:4px 10px;font-size:20px"':'style="font-size:20px;color:var(--brand);padding:4px 10px"'}>‹</button>
      </div>
    </div>`;
  if(!st.count) return html+`<div class="empty">אין רישומים בחודש הזה.<br>אפשר לדפדף אחורה עם החיצים ›</div>`;
  html+=`<div class="stat-grid">
      <div class="stat"><div class="n" style="color:var(--brand)">${st.avgSleep.toFixed(1)}<span style="font-size:13px"> ש׳</span></div><div class="l">ממוצע שינה ליום</div></div>
      <div class="stat"><div class="n" style="color:var(--gold)">${st.avgMeals.toFixed(1)}</div><div class="l">ממוצע ארוחות ליום</div></div>
    </div>`;
  if(deltaTxt) html+=`<div class="card ${kidClass(k)}" style="background:#fbfaf6"><div style="font-size:13.5px">📈 ${deltaTxt}</div></div>`;
  html+=`<div class="card"><div class="tiny" style="font-weight:700;color:var(--brand-d)">😴 שעות שינה לאורך החודש (לפי יום)</div>${bars}</div>`;
  return html;
}
function nowHHMM(){ const d=new Date(); return d.toTimeString().slice(0,5); }
function mealNow(){ const h=new Date().getHours(); return h<11?"בוקר":h<16?"צהריים":h<21?"ערב":"ביניים"; }
function segHTML(id,opts,sel,extra){ return `<div class="seg" id="${id}" ${extra||""}>`+opts.map(o=>`<button data-v="${o[0]}" class="${o[0]===sel?'on':''}">${o[1]}</button>`).join("")+`</div>`; }
/* טוסט אישור קצר */
let toastTimer=null;
function toast(msg){
  let t=document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast"; t.className="toast"; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add("on");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("on"),1700);
}

  if(f) hint.textContent=`נבחר: ${f.name} (${(f.size/1024/1024).toFixed(1)}MB)`;

function readFileForUpload(file){
  return new Promise((resolve,reject)=>{
    if(file.type.startsWith("image/")){
      const img=new Image(); const r=new FileReader();
      r.onload=()=>{ img.onload=()=>{
        const max=1500; let {width,height}=img;
        if(width>max||height>max){ const s=max/Math.max(width,height); width=Math.round(width*s); height=Math.round(height*s); }
        const c=document.createElement("canvas"); c.width=width; c.height=height;
        c.getContext("2d").drawImage(img,0,0,width,height);
        resolve({data:c.toDataURL("image/jpeg",0.72), mime:"image/jpeg"});
      }; img.onerror=reject; img.src=r.result; };
      r.onerror=reject; r.readAsDataURL(file);
    } else {
      const r=new FileReader();
      r.onload=()=>resolve({data:r.result, mime:file.type||"application/octet-stream"});
      r.onerror=reject; r.readAsDataURL(file);
    }
  });
}
async function saveFile(){
  const inp=document.getElementById("f-file"); const file=inp.files[0];
  if(!file){ alert("בחרו קובץ להעלאה"); return; }
  const btn=document.getElementById("fileSaveBtn"); btn.textContent="מעלה…"; btn.disabled=true;
  try{
    const {data,mime}=await readFileForUpload(file);
    if(data.length>6*1024*1024){ alert("הקובץ גדול מדי (מעל ~4MB). נסו תמונה או PDF קטן יותר."); btn.textContent="שמירה בענן"; btn.disabled=false; return; }
    const id=uid();
    const r=await fetch(FILE_NODE+"/"+id+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({data,mime})});
    if(!r.ok) throw new Error("upload failed");
    STATE.files.push({id,kid:CUR_KID,category:val("f-fcat"),title:val("f-ftitle").trim(),
      filename:file.name,mime,date:val("f-fdate"),note:val("f-fnote").trim(),createdBy:ME,createdAt:Date.now()});
    logActivity(`העלה/תה מסמך ל${KIDS[CUR_KID].name}: ${val("f-fcat")}${val("f-ftitle")?" · "+val("f-ftitle").trim():""}`,"📁");
    closeSheet(); pushCloud(); render();
  }catch(e){ alert("ההעלאה נכשלה, נסו שוב"); btn.textContent="שמירה בענן"; btn.disabled=false; }
}
function dataURLtoBlob(dataURL){
  const [head,b64]=dataURL.split(","); const mime=(head.match(/:(.*?);/)||[])[1]||"application/octet-stream";
  const bin=atob(b64); const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}
async function openFile(id){
  try{
    const r=await fetch(FILE_NODE+"/"+id+".json");
    const o=await r.json();
    if(!o||!o.data){ alert("הקובץ לא נמצא"); return; }
    const url=URL.createObjectURL(dataURLtoBlob(o.data));
    window.open(url,"_blank");
    setTimeout(()=>URL.revokeObjectURL(url),60000);
  }catch(e){ alert("שגיאה בפתיחת הקובץ"); }
}
async function delFile(id){
  if(!confirm("למחוק את הקובץ לצמיתות?"))return;
  STATE.files=STATE.files.filter(x=>x.id!==id);
  try{ await fetch(FILE_NODE+"/"+id+".json",{method:"DELETE"}); }catch(e){}
  pushCloud(); render();
}

/* =====================================================================

const HE_MONTHS=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
const DOW_HE=["א","ב","ג","ד","ה","ו","ש"];
function calMonth(){ return CAL_MONTH || todayISO().slice(0,7); }
function calDate(){ return CAL_DATE || todayISO(); }
function calSetMonth(){ const y=val("cal-year"), m=val("cal-month"); CAL_MONTH=y+"-"+m; render(); }
function calShift(n){ const [y,m]=calMonth().split("-").map(Number); const d=new Date(y,m-1+n,1);
  CAL_MONTH=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); render(); }
function calToday(){ CAL_MONTH=null; CAL_DATE=null; render(); }
function calPick(iso){ CAL_DATE=iso; render(); }
/* מה קרה ביום נתון (לילד הנבחר) */
function dayActivity(k, iso){
  return {
    diary: STATE.diary.filter(e=>e.kid===k&&e.date===iso),
    expense: STATE.expenses.filter(e=>e.kid===k&&e.date===iso),
    task: STATE.tasks.filter(t=>t.kid===k&&t.due===iso),
    file: STATE.files.filter(f=>f.kid===k&&f.date===iso),
  };
}
function viewCalendar(){
  const k=CUR_KID, ym=calMonth(), [y,m]=ym.split("-").map(Number);
  const yNow=new Date().getFullYear();
  const firstDow=new Date(y,m-1,1).getDay();
  const daysInMonth=new Date(y,m,0).getDate();
  const today=todayISO(), sel=calDate();

  // בורר חודש/שנה + חיצים
  let html=`<div class="cal-nav">
    <button class="arw" onclick="calShift(1)">›</button>
    <select id="cal-month" onchange="calSetMonth()">${HE_MONTHS.map((nm,i)=>`<option value="${String(i+1).padStart(2,'0')}" ${i+1===m?'selected':''}>${nm}</option>`).join("")}</select>
    <select id="cal-year" onchange="calSetMonth()">${[yNow-2,yNow-1,yNow,yNow+1].map(yy=>`<option ${yy===y?'selected':''}>${yy}</option>`).join("")}</select>
    <button class="arw" onclick="calShift(-1)">‹</button>
  </div>`;
  html+=`<button class="cal-today" onclick="calToday()">↩︎ חזרה להיום</button>`;

  // כותרות ימים
  html+=`<div class="cal-grid">`+DOW_HE.map(d=>`<div class="cal-dow">${d}</div>`).join("");
  // תאים ריקים בתחילת החודש
  for(let i=0;i<firstDow;i++) html+=`<div class="cal-cell empty"></div>`;
  // ימי החודש
  for(let d=1; d<=daysInMonth; d++){
    const iso=ym+"-"+String(d).padStart(2,"0");
    const a=dayActivity(k,iso);
    let dots="";
    if(a.diary.length) dots+=`<span class="cal-dot" style="background:#3f9d6d"></span>`;
    if(a.expense.length) dots+=`<span class="cal-dot" style="background:#d9a441"></span>`;
    if(a.task.length) dots+=`<span class="cal-dot" style="background:#6a8fd8"></span>`;
    if(a.file.length) dots+=`<span class="cal-dot" style="background:#c05fb0"></span>`;
    const cls=[(iso===today?"today":""),(iso===sel?"sel":"")].join(" ");
    html+=`<div class="cal-cell ${cls}" onclick="calPick('${iso}')">
      <span class="dnum">${d}</span><div class="cal-dots">${dots}</div></div>`;
  }
  html+=`</div>`;

  // מקרא
  html+=`<div class="cal-legend">
    <span><i style="background:#3f9d6d"></i>יומן</span>
    <span><i style="background:#d9a441"></i>הוצאה</span>
    <span><i style="background:#6a8fd8"></i>משימה</span>
    <span><i style="background:#c05fb0"></i>מסמך</span>

  // פירוט היום הנבחר
  html+=calDayDetail(k, sel);
  return html;

  if(a.task.length){
    html+=`<div class="card"><div class="tiny" style="font-weight:800;color:#516074;margin-bottom:4px">✅ משימות ליום זה</div>`;
    html+=a.task.map(t=>`<div class="item"><h4 class="${t.done?'':''}">${t.done?"✔️ ":""}${esc(t.title)}</h4>
      <div class="tiny">אחראי: ${esc(t.owner)}${t.done?" · בוצע":""}</div></div>`).join("")+`</div>`;
  }
  return html;
}

/* =====================================================================
   מתכונים — ספר בישול משותף לשני ההורים (בעיקר לעמנואל)
   ===================================================================== */
const RECIPE_MEALS = ["בוקר","צהריים","ערב","חטיף"];
const RECIPE_ICON = {"בוקר":"🌅","צהריים":"☀️","ערב":"🌙","חטיף":"🍎"};
function viewRecipes(){
  const list=STATE.recipes.slice().sort((a,b)=>b.createdAt-a.createdAt);
  let html=`<button class="add-btn" onclick="openRecipeForm()">＋ הוספת מתכון</button>`;
  html+=`<div class="tiny" style="text-align:center;margin:-6px 0 12px;color:var(--muted)">ספר מתכונים משותף — כל מה שעובד טוב לילדים, במקום אחד 🍽️</div>`;
  if(!list.length) return html+`<div class="empty">אין מתכונים עדיין.<br>מי שמכיר ארוחה טובה — מוזמן להוסיף! 🙂</div>`;
  RECIPE_MEALS.forEach(meal=>{
    const items=list.filter(r=>r.meal===meal); if(!items.length) return;
    html+=`<div class="section-title">${RECIPE_ICON[meal]} ${meal} (${items.length})</div>`;
    html+=items.map(r=>`<div class="card" onclick="editRecipe('${r.id}')" style="cursor:pointer">
      <div class="row spread">
        <h4 style="font-size:16px;color:var(--brand-d)">${esc(r.title)}</h4>
        <span class="tiny">✏️</span>
      </div>
      ${r.ingredients?`<div style="margin-top:8px"><b class="tiny" style="color:var(--brand-d)">מרכיבים:</b><div style="font-size:14px;white-space:pre-line">${esc(r.ingredients)}</div></div>`:""}
      ${r.steps?`<div style="margin-top:8px"><b class="tiny" style="color:var(--brand-d)">הכנה:</b><div style="font-size:14px;white-space:pre-line">${esc(r.steps)}</div></div>`:""}
      ${r.note?`<div class="tiny" style="margin-top:8px;color:var(--warn)">💡 ${esc(r.note)}</div>`:""}
      <div class="tiny" style="margin-top:8px">מאת ${esc(r.createdBy)}</div>
    </div>`).join("");
  });
  return html;
}
function openRecipeForm(e){
  editing=true; EDIT_ID = e?e.id:null;
  sheet(`<h3>🍳 ${e?"עריכת מתכון":"מתכון חדש"}</h3>
    <div class="field"><label>שם המתכון</label><input id="f-rtitle" value="${e?esc(e.title):""}" placeholder="למשל: פנקייק בננה ללא סוכר"></div>
    <div class="field"><label>לאיזו ארוחה</label>
      ${segHTML("f-rmeal",RECIPE_MEALS.map(m=>[m,RECIPE_ICON[m]+" "+m]), e?e.meal:"בוקר")}</div>
    <div class="field"><label>מרכיבים (שורה לכל מרכיב)</label><textarea id="f-ring" style="min-height:90px" placeholder="בננה בשלה 1&#10;ביצה 1&#10;קמח שיבולת שועל 3 כפות">${e?esc(e.ingredients||""):""}</textarea></div>
    <div class="field"><label>אופן ההכנה</label><textarea id="f-rsteps" style="min-height:90px" placeholder="מועכים את הבננה, מוסיפים ביצה וקמח, מטגנים במחבת…">${e?esc(e.steps||""):""}</textarea></div>
    <div class="field"><label>טיפ / מתאים מגיל (רשות)</label><input id="f-rnote" value="${e?esc(e.note||""):""}" placeholder="מתאים מגיל 8 חודשים / אפשר להקפיא"></div>
    <button class="save" onclick="saveRecipe()">שמירה</button>
    ${e?`<div class="cancel" style="color:var(--danger);font-weight:800" onclick="delRecipe('${e.id}');closeSheet()">🗑 מחיקת המתכון</div>`:""}
    <div class="cancel" onclick="closeSheet()">ביטול</div>`);
  segify();
}
function saveRecipe(){
  const title=val("f-rtitle").trim(); if(!title){ alert("צריך שם למתכון"); return; }
  const data={title,meal:segVal("f-rmeal"),ingredients:val("f-ring").trim(),steps:val("f-rsteps").trim(),note:val("f-rnote").trim()};
  if(EDIT_ID){ Object.assign(STATE.recipes.find(x=>x.id===EDIT_ID),data); }
  else STATE.recipes.push(Object.assign({id:uid(),createdBy:ME,createdAt:Date.now()},data));
  logActivity(`הוסיף/ה מתכון: ${title}`,"🍳");
  closeSheet(); pushCloud(); render();
}
function editRecipe(id){ const r=STATE.recipes.find(x=>x.id===id); if(r) openRecipeForm(r); }
function delRecipe(id){ if(!confirm("למחוק מתכון?"))return; STATE.recipes=STATE.recipes.filter(x=>x.id!==id); pushCloud(); render(); }

/* =====================================================================
   מודל / טופס
   ===================================================================== */
const overlay=document.getElementById("overlay");
function sheet(html){ document.getElementById("sheet").innerHTML=html; overlay.classList.add("on"); }
function closeSheet(){ overlay.classList.remove("on"); editing=false; EDIT_ID=null; }
overlay.addEventListener("click",e=>{ if(e.target===overlay) closeSheet(); });
function segify(){
  document.querySelectorAll(".seg").forEach(seg=>{
    seg.querySelectorAll("button").forEach(b=> b.onclick=()=>{
      seg.querySelectorAll("button").forEach(x=>x.classList.remove("on")); b.classList.add("on");
    });
  });
}
function segVal(id){ const el=document.querySelector("#"+id+" .on"); return el?el.dataset.v:""; }
function val(id){ const el=document.getElementById(id); return el?el.value:""; }
function bindMain(){ /* placeholder for future bindings */ }

/* =====================================================================
   הפעלה
   ===================================================================== */
(function init(){
  const saved=localStorage.getItem("horut_me");
  if(saved && PARENTS.includes(saved)){ ME=saved; startApp(); }
})();
</script>
